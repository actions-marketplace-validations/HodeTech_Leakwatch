version: 2

project_name: leakwatch

builds:
  - binary: leakwatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

brews:
  - repository:
      owner: HodeTech
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/HodeTech/Leakwatch
    description: High-performance secret scanner for codebases, Git histories, and container images
    license: MIT
    test: |
      system "#{bin}/leakwatch", "version"

dockers:
  - image_templates:
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source=https://github.com/HodeTech/Leakwatch
      - --label=org.opencontainers.image.licenses=MIT

  - image_templates:
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source=https://github.com/HodeTech/Leakwatch
      - --label=org.opencontainers.image.licenses=MIT

docker_manifests:
  - name_template: ghcr.io/hodetech/leakwatch:{{ .Version }}
    image_templates:
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-amd64
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-arm64

  - name_template: ghcr.io/hodetech/leakwatch:latest
    image_templates:
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-amd64
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-arm64

  - name_template: ghcr.io/hodetech/leakwatch:v{{ .Major }}.{{ .Minor }}
    image_templates:
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-amd64
      - ghcr.io/hodetech/leakwatch:{{ .Version }}-arm64

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
