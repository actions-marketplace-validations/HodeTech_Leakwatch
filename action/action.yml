name: 'Leakwatch Secret Scanner'
description: 'Scan your codebase for leaked secrets (API keys, passwords, certificates)'
author: 'cemililik'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  scan-type:
    description: 'Scan type: fs, git, or image'
    required: false
    default: 'fs'
  path:
    description: 'Path to scan (for fs/git) or image reference (for image)'
    required: false
    default: '.'
  format:
    description: 'Output format: json, sarif, csv, table'
    required: false
    default: 'sarif'
  only-verified:
    description: 'Only report verified active secrets'
    required: false
    default: 'false'
  no-verify:
    description: 'Disable secret verification'
    required: false
    default: 'true'
  min-severity:
    description: 'Minimum severity to report: low, medium, high, critical'
    required: false
    default: 'low'
  sarif-upload:
    description: 'Upload SARIF results to GitHub Code Scanning'
    required: false
    default: 'false'
  version:
    description: 'Leakwatch version to use'
    required: false
    default: 'latest'

outputs:
  findings-count:
    description: 'Number of secrets found'
  sarif-file:
    description: 'Path to SARIF output file (if format=sarif)'

runs:
  using: 'composite'
  steps:
    - name: Install Leakwatch
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ "$INPUT_VERSION" = "latest" ]; then
          go install github.com/cemililik/leakwatch@latest
        else
          go install "github.com/cemililik/leakwatch@$INPUT_VERSION"
        fi

    - name: Run scan
      id: scan
      shell: bash
      env:
        INPUT_SCAN_TYPE: ${{ inputs.scan-type }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_MIN_SEVERITY: ${{ inputs.min-severity }}
        INPUT_ONLY_VERIFIED: ${{ inputs.only-verified }}
        INPUT_NO_VERIFY: ${{ inputs.no-verify }}
      run: |
        ARGS=(scan "$INPUT_SCAN_TYPE" "$INPUT_PATH" --format "$INPUT_FORMAT" --min-severity "$INPUT_MIN_SEVERITY")

        if [ "$INPUT_ONLY_VERIFIED" = "true" ]; then
          ARGS+=(--only-verified)
        fi

        if [ "$INPUT_NO_VERIFY" = "true" ]; then
          ARGS+=(--no-verify)
        fi

        if [ "$INPUT_FORMAT" = "sarif" ]; then
          ARGS+=(--output results.sarif)
          echo "sarif-file=results.sarif" >> "$GITHUB_OUTPUT"
        fi

        set +e
        leakwatch "${ARGS[@]}"
        EXIT_CODE=$?
        set -e

        if [ $EXIT_CODE -eq 1 ]; then
          echo "findings-count=1" >> "$GITHUB_OUTPUT"
          echo "::warning::Leakwatch found secrets in your code"
        elif [ $EXIT_CODE -eq 0 ]; then
          echo "findings-count=0" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Leakwatch scan failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Upload SARIF
      if: inputs.sarif-upload == 'true' && inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
        category: leakwatch
