version: "2"

formatters:
  enable:
    - gofumpt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - misspell
    - prealloc
    - revive
    - unconvert
    - bodyclose
    - noctx
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
