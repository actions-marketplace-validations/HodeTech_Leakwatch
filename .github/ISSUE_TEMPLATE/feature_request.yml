name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do that you can't?
      placeholder: I'm scanning a codebase that uses X service but Leakwatch doesn't detect its API keys...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include example config or CLI usage if applicable.
      placeholder: |
        Add a new detector for X:
        ```yaml
        custom-rules:
          - id: "x-api-key"
            regex: "xk_[a-z0-9]{32}"
            keywords: ["xk_"]
            severity: critical
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other solutions you've considered or workarounds you're using.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New detector (secret type)
        - New verifier (secret verification)
        - New scan source (e.g., new cloud provider)
        - Output format / reporting
        - CLI / UX improvement
        - Performance / optimization
        - CI/CD integration
        - Documentation
        - Docker / deployment
        - VS Code extension
        - Custom rules enhancement
        - Remediation guidance
        - Other
    validations:
      required: true

  - type: dropdown
    id: willingness
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes, I'd like to submit a PR"
        - "I can help with testing"
        - "No, just suggesting"
    validations:
      required: true
