name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      # actions/checkout@v6.0.0
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0
          persist-credentials: false
      # actions/setup-go@v6.0.0
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: '1.25.10'
      # docker/setup-qemu-action@v3.2.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf
      # docker/setup-buildx-action@v3.7.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349
      # docker/login-action@v3.3.0
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # goreleaser/goreleaser-action@v6.4.0
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Move the floating major tag (e.g. v1) to this release so consumers can
      # pin `uses: HodeTech/Leakwatch@v1` and always get the latest v1.x. Skipped
      # for pre-releases (tags containing a hyphen, e.g. v1.5.0-rc.1). Uses the
      # REST API via gh so it works with the persist-credentials: false checkout.
      - name: Update major version tag
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          MAJOR="${TAG%%.*}"   # v1.5.0 -> v1
          if [ "$MAJOR" = "$TAG" ] || [ -z "$MAJOR" ]; then
            echo "Could not derive a major tag from '$TAG'; skipping."
            exit 0
          fi
          echo "Pointing ${MAJOR} at ${SHA} (${TAG})"
          if gh api "repos/${REPO}/git/refs/tags/${MAJOR}" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${REPO}/git/refs/tags/${MAJOR}" -f sha="${SHA}" -F force=true >/dev/null
          else
            gh api -X POST "repos/${REPO}/git/refs" -f ref="refs/tags/${MAJOR}" -f sha="${SHA}" >/dev/null
          fi
          echo "Major tag ${MAJOR} now points at ${TAG}."
